events {
    worker_connections 1024;
}

http {
    upstream llm_backends {
        least_conn;  # better than round-robin for variable-length LLM requests
        server 127.0.0.1:8081;
        server 127.0.0.1:8082;
        keepalive 32;
    }
    server {
        listen 8080;
        location / {
            proxy_pass http://llm_backends;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
            proxy_request_buffering off;          # don't buffer the request body either
            tcp_nodelay on;                        # flush small packets immediately
            keepalive_timeout 620s;               # must exceed proxy_read_timeout

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Vertex AI passes these through — preserve them
            proxy_set_header X-Cloud-Trace-Context $http_x_cloud_trace_context;

            # HTTP/1.1 required for keepalive upstream
            proxy_http_version 1.1;

            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 10s;
        }

        location /health {
            access_log off;  # don't pollute logs with constant probe noise

            proxy_pass http://127.0.0.1:8081/health;
            proxy_read_timeout 5s;  # fail fast on health probes
        }

    }
}